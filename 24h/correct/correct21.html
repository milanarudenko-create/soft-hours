   <p>oatmeal recipe:
    <br>
    <br>* oats (about 1/2 cup)
    <br>* water or milk (about 1 cup)
    <br>* pinch of salt
    <br>* 2 wild peaches
    <br>
    <br>cook oats with water or milk over medium heat, stirring occasionally, until thick and soft (about 5–7 minutes). add honey, peaches, or other fruit if you want. eat warm.</p>
